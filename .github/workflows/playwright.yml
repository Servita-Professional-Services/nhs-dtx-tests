name: NHS DTx Automation Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright:v1.52.0-noble

    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          BASE_URL: https://ddjc0dec27n24.cloudfront.net

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Publish test summary
        if: always()
        run: |
          echo "## NHS DTx E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Suite: Playwright E2E" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: CI" >> $GITHUB_STEP_SUMMARY
          echo "- Allure report artifact: allure-report" >> $GITHUB_STEP_SUMMARY
          echo "- Playwright HTML report artifact: playwright-report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Notes" >> $GITHUB_STEP_SUMMARY
          echo "- Download Allure report and open index.html." >> $GITHUB_STEP_SUMMARY
          echo "- Playwright HTML report is available as backup." >> $GITHUB_STEP_SUMMARY

  deploy-allure-report:
    name: Deploy Allure Report to GitHub Pages
    if: always() && github.ref == 'refs/heads/main'
    needs: e2e-tests
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Allure report artifact
        uses: actions/download-artifact@v5
        with:
          name: allure-report
          path: ./allure-report

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4