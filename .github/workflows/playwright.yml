name: NHS DTx Automation Tests

# NOTE:
# Currently only E2E tests are active.
# API and Contract tests are placeholders for future implementation.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload E2E JUnit results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-junit-results
          path: test-results/junit/
          retention-days: 30

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-artifacts
          path: test-results/artifacts/
          retention-days: 30

      - name: Publish test summary
        if: always()
        run: |
          echo "## NHS DTx E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Suite: Playwright E2E" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: CI" >> $GITHUB_STEP_SUMMARY
          echo "- Allure report artifact: allure-report" >> $GITHUB_STEP_SUMMARY
          echo "- Allure raw results artifact: allure-results" >> $GITHUB_STEP_SUMMARY
          echo "- Playwright HTML report artifact: e2e-playwright-report" >> $GITHUB_STEP_SUMMARY
          echo "- JUnit results artifact: e2e-junit-results" >> $GITHUB_STEP_SUMMARY
          echo "- Failure evidence artifact: e2e-artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Notes" >> $GITHUB_STEP_SUMMARY
          echo "- Download the Allure report artifact and open index.html for dashboard view." >> $GITHUB_STEP_SUMMARY
          echo "- Playwright HTML report is also available as a backup detailed report." >> $GITHUB_STEP_SUMMARY
          echo "- Review screenshots, traces, or videos for failed scenarios if available." >> $GITHUB_STEP_SUMMARY

  # ---------------- FUTURE SCOPE ---------------- #

  api-tests:
    name: API Tests (Future)
    runs-on: ubuntu-latest
    if: false

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run API tests
        run: npm run test:api
        env:
          CI: true

      - name: Upload API results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: api-junit-results
          path: test-results/junit/
          retention-days: 30

  contract-tests:
    name: Contract Tests (Future)
    runs-on: ubuntu-latest
    if: false

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run Contract tests
        run: npm run test:contract
        env:
          CI: true

      - name: Upload Contract results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: contract-junit-results
          path: test-results/junit/
          retention-days: 30