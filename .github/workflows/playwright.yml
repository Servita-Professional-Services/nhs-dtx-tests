name: NHS DTx Automation Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  e2e-tests:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        browser: [ chromium ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          CI: true
          BASE_URL: https://ddjc0dec27n24.cloudfront.net
          API_BASE_URL: https://0wxuuapx61.execute-api.eu-west-2.amazonaws.com/dev
          VENDOR_API_KEY: ${{ secrets.VENDOR_API_KEY }}

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.browser }}
          path: allure-report/
          retention-days: 30

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      - name: Publish test summary
        if: always()
        run: |
          echo "## NHS DTx E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Suite: Playwright E2E" >> $GITHUB_STEP_SUMMARY
          echo "- Browser: ${{ matrix.browser }}" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: CI" >> $GITHUB_STEP_SUMMARY
          echo "- Allure report artifact: allure-report-${{ matrix.browser }}" >> $GITHUB_STEP_SUMMARY
          echo "- Playwright HTML report artifact: playwright-report-${{ matrix.browser }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Notes" >> $GITHUB_STEP_SUMMARY
          echo "- Download Allure report and open index.html." >> $GITHUB_STEP_SUMMARY
          echo "- Playwright HTML report is available as backup." >> $GITHUB_STEP_SUMMARY

  # ── API Tests ───────────────────────────────────────────────────────────────
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm run test:api
        env:
          CI: true
          API_BASE_URL: https://0wxuuapx61.execute-api.eu-west-2.amazonaws.com/dev
          VENDOR_API_KEY: ${{ secrets.VENDOR_API_KEY }}

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-api
          path: allure-report/
          retention-days: 30

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 30

      - name: Publish test summary
        if: always()
        run: |
          echo "## NHS DTx API Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Suite: Playwright API" >> $GITHUB_STEP_SUMMARY
          echo "- Endpoint: $API_BASE_URL" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: CI" >> $GITHUB_STEP_SUMMARY
          echo "- Allure report artifact: allure-report-api" >> $GITHUB_STEP_SUMMARY
          echo "- Playwright HTML report artifact: playwright-report-api" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Notes" >> $GITHUB_STEP_SUMMARY
          echo "- Download Allure report and open index.html." >> $GITHUB_STEP_SUMMARY
          echo "- Playwright HTML report is available as backup." >> $GITHUB_STEP_SUMMARY

  # ── Deploy Allure Report ────────────────────────────────────────────────────
  deploy-allure-report:
    name: Deploy Allure Report to GitHub Pages
    if: always() && github.ref == 'refs/heads/main'
    needs: [ e2e-tests, api-tests ]
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Allure report artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report-chromium
          path: ./allure-report

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4