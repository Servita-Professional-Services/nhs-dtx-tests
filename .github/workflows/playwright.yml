name: NHS DTx Automation Tests

# NOTE:
# Currently only E2E tests are active.
# API and Contract tests are placeholders for future implementation.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-junit-results
          path: test-results/junit/
          retention-days: 30

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: test-results/artifacts/
          retention-days: 30


  # ---------------- FUTURE SCOPE ---------------- #

  api-tests:
    name: API Tests (Future)
    runs-on: ubuntu-latest
    if: false   # Disabled until API tests are implemented

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run API tests
        run: npm run test:api
        env:
          CI: true

      - name: Upload API results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-junit-results
          path: test-results/junit/
          retention-days: 30


  contract-tests:
    name: Contract Tests (Future)
    runs-on: ubuntu-latest
    if: false   # Disabled until contract tests are implemented

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run Contract tests
        run: npm run test:contract
        env:
          CI: true

      - name: Upload Contract results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-junit-results
          path: test-results/junit/
          retention-days: 30